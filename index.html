<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设计公司导航</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(29, 29, 31, 0.08);
      --line-strong: rgba(29, 29, 31, 0.16);
      --blue: #0057ff;
      --blue-soft: rgba(0, 87, 255, 0.12);
      --green: #0a7f64;
      --graphite: #111318;
      --shadow: 0 14px 38px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1760px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px) saturate(1.2);
      background: rgba(255, 255, 255, 0.88);
      border-bottom: 1px solid var(--line);
      transition: background 220ms ease, border-color 220ms ease;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .brand:hover {
      transform: translateY(-1px);
      opacity: 0.84;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: block;
      object-fit: contain;
      object-position: center;
      transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .brand:hover .brand-mark {
      transform: rotate(-3deg) scale(1.03);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .nav-pill {
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .nav-pill:hover,
    .nav-pill.is-active {
      color: var(--text);
      background: #ffffff;
      border-color: var(--line);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
    }

    .nav-pill:hover {
      transform: translateY(-1px);
    }

    .hero {
      padding: 32px 0 10px;
    }

    .hero-grid {
      display: block;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      max-width: 100%;
      margin: 0;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1.02;
      letter-spacing: 0;
      white-space: nowrap;
      animation: titleIn 620ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .hero-copy {
      max-width: 650px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.72;
    }

    .hero-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.64);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 86px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-strong);
    }

    .metric-value {
      display: block;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .metric-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .controls-wrap {
      position: sticky;
      top: 56px;
      z-index: 9;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px) saturate(1.15);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      animation: panelIn 520ms cubic-bezier(0.2, 0.8, 0.2, 1) 90ms both;
      transition: border-color 220ms ease, box-shadow 220ms ease, background 220ms ease;
    }

    .controls:focus-within {
      border-color: transparent;
      box-shadow: none;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search-symbol {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      min-height: 44px;
      padding: 0 16px 0 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      outline: 0;
      color: var(--text);
      background: #fff;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .search input:focus {
      border-color: rgba(0, 107, 234, 0.45);
      box-shadow: 0 0 0 4px var(--blue-soft);
    }

    .segmented {
      display: inline-flex;
      min-height: 44px;
      padding: 4px;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .segmented::-webkit-scrollbar {
      display: none;
    }

    .segmented button {
      min-width: 72px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .segmented button[aria-pressed="true"] {
      color: #fff;
      background: var(--blue);
    }

    .segmented button:hover {
      transform: translateY(-1px);
    }

    .select {
      min-height: 44px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: #fff;
      cursor: pointer;
    }

    .section {
      padding: 24px 0 48px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .result-count {
      display: none;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .category {
      margin: 0 0 34px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .category-summary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .category h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .category-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .collapse-toggle {
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .collapse-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #fff;
    }

    .category.is-collapsed .grid {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 22px 14px;
      overflow: visible;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 218px;
      padding: 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      box-shadow: none;
      transform: translateY(8px);
      opacity: 0;
      animation: cardIn 460ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      animation-delay: var(--card-delay, 0ms);
      transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1), border-color 180ms ease, box-shadow 220ms ease, background 180ms ease;
      transform-origin: center center;
      will-change: transform;
    }

    .card::before {
      content: none;
    }

    .card:hover {
      z-index: 2;
      transform: translateY(-4px) scale(1.3);
      background: transparent;
      box-shadow: none;
    }

    .grid:has(.card:hover) .card:not(:hover),
    .grid.is-focusing .card:not(:hover) {
      transform: scale(0.94);
      opacity: 0.76;
    }

    .card:focus-visible,
    .nav-pill:focus-visible,
    .segmented button:focus-visible,
    .collapse-toggle:focus-visible,
    .footer a:focus-visible {
      outline: 3px solid rgba(0, 107, 234, 0.22);
      outline-offset: 3px;
    }

    .card-top {
      position: relative;
      overflow: hidden;
      min-height: 150px;
      padding: 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.28)),
        radial-gradient(circle at 98% 4%, var(--card-accent, rgba(0, 87, 255, 0.1)), transparent 42%),
        radial-gradient(circle at 0% 100%, var(--card-accent-soft, rgba(0, 87, 255, 0.05)), transparent 46%),
        linear-gradient(145deg, color-mix(in srgb, var(--card-wash, #ffffff) 78%, transparent), rgba(245, 246, 248, 0.5));
      backdrop-filter: blur(18px) saturate(1.18);
      -webkit-backdrop-filter: blur(18px) saturate(1.18);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.86) inset,
        0 -1px 0 rgba(255, 255, 255, 0.38) inset,
        0 10px 26px rgba(18, 22, 28, 0.055);
      transition: border-color 180ms ease, box-shadow 220ms ease, transform 220ms ease, background 220ms ease;
    }

    .card-top::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.72) 42%, transparent 58%);
      transform: translateX(-120%);
      opacity: 0;
      transition: transform 520ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 180ms ease;
      z-index: 0;
    }

    .card:hover .card-top::before {
      transform: translateX(120%);
      opacity: 1;
    }

    .card-top::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius) - 1px);
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.58), transparent 34%, rgba(255, 255, 255, 0.18));
      opacity: 0.66;
      z-index: 0;
    }

    .card:hover .card-top {
      border-color: var(--line-strong);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.92) inset,
        0 -1px 0 rgba(255, 255, 255, 0.42) inset,
        0 14px 34px rgba(18, 22, 28, 0.075);
    }

    .card-top > * {
      position: relative;
      z-index: 1;
    }

    .logo-box {
      min-width: 0;
      width: 100%;
      height: 112px;
      display: flex;
      align-items: center;
    }

    .company-logo {
      display: none;
      width: var(--logo-width, auto);
      max-width: min(var(--logo-max-width, 190px), 100%);
      max-height: var(--logo-max-height, 64px);
      object-fit: contain;
      object-position: left center;
      filter: saturate(0.96) contrast(1.02);
      transition: transform 220ms ease, filter 220ms ease;
    }

    .logo-box.has-logo .company-logo {
      display: block;
    }

    .logo-box.invert-logo .company-logo {
      filter: invert(1) saturate(0) contrast(1.08);
    }

    .brand-wordmark {
      display: none;
      max-width: 100%;
      font-size: var(--wordmark-size, 18px);
      font-weight: var(--wordmark-weight, 700);
      line-height: 1;
      color: var(--wordmark-color, var(--text));
      letter-spacing: var(--wordmark-spacing, 0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo-box.has-wordmark .brand-wordmark {
      display: block;
    }

    .logo-box.has-wordmark .company-logo {
      display: none;
    }

    .logo-box.has-wordmark .company-name,
    .logo-box.has-logo .company-name {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .company-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.24;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .open-mark {
      position: absolute;
      top: 16px;
      right: 16px;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: transparent;
      background: transparent;
      font-size: 0;
      transition: transform 220ms ease, border-color 180ms ease, background 180ms ease, opacity 180ms ease;
    }

    .card:hover .company-logo {
      transform: scale(1.035);
      filter: saturate(1.05) contrast(1.04);
    }

    .card:hover .open-mark {
      transform: scale(0.68);
      border-color: rgb(252, 102, 5);
      background: rgb(252, 102, 5);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 0;
      min-height: 26px;
    }

    .tag {
      max-width: 100%;
      padding: 5px 8px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: #f7f8fa;
      font-size: 11px;
      line-height: 1.2;
      overflow-wrap: anywhere;
      transition: border-color 180ms ease, background 180ms ease;
    }

    .tag.region {
      color: var(--green);
      background: rgba(10, 127, 100, 0.08);
      border-color: rgba(10, 127, 100, 0.18);
    }

    .url {
      margin-top: auto;
      padding-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      padding: 42px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
      color: var(--muted);
    }

    .empty.is-visible {
      display: block;
      animation: panelIn 260ms ease both;
    }

    .footer {
      padding: 28px 0 38px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.7;
    }

    .footer a {
      color: rgb(252, 102, 5);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer a:hover {
      color: #4563FB;
    }

    @keyframes titleIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 980px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .segmented,
      .select {
        width: 100%;
      }

      .segmented button {
        flex: 1 1 0;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 28px, 1180px);
      }

      .topbar-inner {
        min-height: 58px;
      }

      .nav-actions {
        display: none;
      }

      .hero {
        padding-top: 46px;
      }

      h1 {
        font-size: clamp(31px, 9.4vw, 44px);
        line-height: 1.02;
      }

      .hero-copy {
        font-size: 16px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .section-head,
      .category-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="#top" aria-label="回到顶部">
        <img class="brand-mark" src="cando.png?v=20260624171505" alt="CanDo">
        <span>cando design</span>
      </a>
      <nav class="nav-actions" aria-label="快速筛选">
        <button class="nav-pill is-active" type="button" data-nav-filter="全部">全部</button>
        <button class="nav-pill" type="button" data-nav-filter="产品设计">产品</button>
        <button class="nav-pill" type="button" data-nav-filter="包装视觉">包装视觉</button>

        <button class="nav-pill" type="button" data-nav-filter="综合">综合</button>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="shell hero-grid">
        <div>

        </div>
      </div>
    </section>

    <section class="controls-wrap" aria-label="搜索与筛选">
      <div class="shell">

    <section class="section">
      <div class="shell">
        <div class="section-head">
          <h2 class="section-title">全部站点</h2>
          <span class="result-count" id="resultCount" aria-hidden="true"></span>
        </div>
        <div id="directory"></div>
        <div class="empty" id="emptyState">没有匹配的网站，换一个关键词或筛选条件试试。</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="shell">
      数据资料来自个人日常收集，不够全面，欢迎大家补充。交流邮箱：<a href="mailto:cando53@163.com">cando53@163.com</a>
    </div>
  </footer>

      ["fuseproject", { text: "fuseproject", color: "#111111", size: "20px", weight: 700 }],
      ["ideo", { text: "IDEO", color: "#111111", size: "22px", weight: 800, spacing: "0.02em" }],
      ["frog", { text: "frog", color: "#121212", size: "24px", weight: 800 }],
      ["teams", { text: "TEAMS", color: "#111111", size: "21px", weight: 800, spacing: "0.04em" }],
      ["phoenix", { text: "PHOENIX", color: "#111111", size: "19px", weight: 800, spacing: "0.04em" }],
      ["nr21 design", { text: "nr21 DESIGN", color: "#111111", size: "19px", weight: 800 }],
      ["nendo", { text: "nendo", color: "#111111", size: "22px", weight: 600 }],
      ["kickstarter", { text: "Kickstarter", color: "#05ce78", size: "20px", weight: 800 }],
      ["pininfarina", { text: "Pininfarina", color: "#103f8f", size: "20px", weight: 700 }],
      ["bmw designworks", { text: "Designworks", color: "#111111", size: "20px", weight: 700 }],
      ["audi-mediacenter", { text: "Audi MediaCenter", color: "#111111", size: "18px", weight: 700 }],
      ["wearefluid", { text: "FLUID", color: "#111111", size: "21px", weight: 800, spacing: "0.08em" }],
      ["teenage engineering", { text: "teenage engineering", color: "#111111", size: "17px", weight: 700 }],
      ["held+team", { text: "held+team", color: "#111111", size: "21px", weight: 700 }],
      ["studiofaporsche", { text: "Studio F. A. Porsche", color: "#111111", size: "17px", weight: 700 }],
      ["ammunition", { text: "ammunition", color: "#ff5a00", size: "20px", weight: 700 }],
      ["vitalygrossmann", { text: "Vitaly Grossmann", color: "#111111", size: "18px", weight: 700 }],
      ["indare", { text: "INDARE", color: "#111111", size: "21px", weight: 800, spacing: "0.05em" }],
      ["yang design", { text: "YANG DESIGN", color: "#111111", size: "19px", weight: 800, spacing: "0.04em" }],
      ["佳简几何", { text: "XIVO DESIGN", color: "#111111", size: "19px", weight: 800, spacing: "0.03em" }],
      ["摩根", { text: "MOORGEN", color: "#111111", size: "20px", weight: 800, spacing: "0.05em" }],
      ["leapx", { text: "LEAPX", color: "#111111", size: "22px", weight: 800, spacing: "0.04em" }],
      ["所思", { text: "SUOSI DESIGN", color: "#111111", size: "18px", weight: 800, spacing: "0.05em" }],
      ["bkid", { text: "BKID", color: "#111111", size: "22px", weight: 800, spacing: "0.05em" }],
      ["vlndstudio", { text: "VLNDSTUDIO", color: "#111111", size: "18px", weight: 800, spacing: "0.04em" }],
      ["acasso", { text: "acasso", color: "#111111", size: "22px", weight: 700 }],
      ["bebop", { text: "BEBOP", color: "#111111", size: "22px", weight: 800, spacing: "0.04em" }],
      ["buyrus", { text: "BUYRUS", color: "#111111", size: "21px", weight: 800, spacing: "0.04em" }],
      ["star", { text: "Star", color: "#111111", size: "23px", weight: 800 }],
      ["hida", { text: "HIDA", color: "#111111", size: "22px", weight: 800, spacing: "0.06em" }],
      ["pentagram", { text: "Pentagram", color: "#e30613", size: "20px", weight: 800 }],
      ["renderfolk", { text: "renderfolk", color: "#111111", size: "21px", weight: 800 }],
      ["ablackcover", { text: "ablackcover", color: "#111111", size: "20px", weight: 800 }],
      ["潘虎设计实验室", { text: "PANTHER", color: "#111111", size: "21px", weight: 800, spacing: "0.06em" }]
    ]);

    const CARD_PALETTES = [
      { accent: "rgba(0, 87, 255, 0.11)", soft: "rgba(0, 87, 255, 0.045)", wash: "#fbfdff" },
      { accent: "rgba(252, 102, 5, 0.12)", soft: "rgba(252, 102, 5, 0.045)", wash: "#fffdfb" },
      { accent: "rgba(10, 127, 100, 0.12)", soft: "rgba(10, 127, 100, 0.045)", wash: "#fbfffd" },
      { accent: "rgba(132, 79, 255, 0.12)", soft: "rgba(132, 79, 255, 0.045)", wash: "#fdfcff" },
      { accent: "rgba(235, 64, 116, 0.11)", soft: "rgba(235, 64, 116, 0.04)", wash: "#fffbfd" },
      { accent: "rgba(0, 154, 183, 0.12)", soft: "rgba(0, 154, 183, 0.045)", wash: "#fbfeff" },
      { accent: "rgba(196, 151, 43, 0.13)", soft: "rgba(196, 151, 43, 0.045)", wash: "#fffef9" },
      { accent: "rgba(80, 108, 129, 0.12)", soft: "rgba(80, 108, 129, 0.045)", wash: "#fbfcfd" }
    ];

    const state = {
      query: "",
      category: "全部",
      region: "全部"
    };
    const collapsedGroups = new Set();

    const directory = document.querySelector("#directory");
    const resultCount = document.querySelector("#resultCount");
    const emptyState = document.querySelector("#emptyState");
    const searchInput = document.querySelector("#searchInput");
    const categorySelect = document.querySelector("#categorySelect");
    const regionButtons = document.querySelector("#regionButtons");
    const navPills = Array.from(document.querySelectorAll("[data-nav-filter]"));

    const collator = new Intl.Collator("zh-CN", { numeric: true, sensitivity: "base" });
    const categoryOrder = new Map(["产品设计", "包装视觉", "CMF", "创意工具", "综合"].map((name, index) => [name, index]));
    const regionOrder = new Map(["欧美", "中国", "日本", "韩国", "包装视觉", "CMF", "创意工具", "综合"].map((name, index) => [name, index]));
    const companyOrder = new Map(COMPANIES.map((item, index) => [`${item.name}|${item.url}`, index]));
    const categories = ["全部", ...uniqueCategories(COMPANIES.map((item) => item.category))];
    const regions = ["全部", ...uniqueRegions(COMPANIES.map((item) => item.region))];

    const metricTotal = document.querySelector("#metricTotal");
    const metricCategories = document.querySelector("#metricCategories");
    const metricRegions = document.querySelector("#metricRegions");
    if (metricTotal) metricTotal.textContent = COMPANIES.length;
    if (metricCategories) metricCategories.textContent = categories.length - 1;
    if (metricRegions) metricRegions.textContent = regions.length - 1;

    if (categorySelect) {
      categorySelect.innerHTML = categories
        .map((category) => `<option value="${escapeAttr(category)}">${escapeHtml(category)}</option>`)
        .join("");
    }

    if (regionButtons) {
      regionButtons.innerHTML = regions
        .map((region, index) => `<button type="button" data-region="${escapeAttr(region)}" aria-pressed="${index === 0}">${escapeHtml(region)}</button>`)
        .join("");
    }

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    categorySelect?.addEventListener("change", (event) => {
      state.category = event.target.value;
      syncNav();
      render();
    });

    regionButtons?.addEventListener("click", (event) => {
      const button = event.target.closest("[data-region]");
      if (!button) return;
      state.region = button.dataset.region;
      syncRegionButtons();
      render();
    });

    navPills.forEach((button) => {
      button.addEventListener("click", () => {
        state.category = button.dataset.navFilter;
        if (categorySelect) categorySelect.value = state.category;
        syncNav();
        render();
      });
    });

    directory.addEventListener("click", (event) => {
      const button = event.target.closest("[data-collapse-group]");
      if (!button) return;
      const groupKey = button.dataset.collapseGroup;
      if (collapsedGroups.has(groupKey)) {
        collapsedGroups.delete(groupKey);
      } else {
        collapsedGroups.add(groupKey);
      }
      render();
    });

    directory.addEventListener("pointerover", (event) => {
      const card = event.target.closest(".card");
      if (!card) return;
      card.closest(".grid")?.classList.add("is-focusing");
    });

    directory.addEventListener("pointerout", (event) => {
      const grid = event.target.closest(".grid");
      if (!grid || grid.contains(event.relatedTarget)) return;
      grid.classList.remove("is-focusing");
    });

    render();

    function render() {
      const filtered = COMPANIES
        .filter(matchesFilters)
        .sort((a, b) =>
          compareCategory(a.category, b.category) ||
          compareRegion(a.region, b.region) ||
          getCompanyOrder(a) - getCompanyOrder(b)
        );

      resultCount.textContent = `${filtered.length} / ${COMPANIES.length} 个结果`;
      emptyState.classList.toggle("is-visible", filtered.length === 0);
      directory.innerHTML = groupedMarkup(filtered);
      hydrateLogos();
    }

    function matchesFilters(item) {
      const searchText = [item.name, item.url, item.category, item.region, ...(item.notes || [])].join(" ").toLowerCase();
      const byQuery = !state.query || searchText.includes(state.query);
      const byCategory = state.category === "全部" || item.category === state.category;
      const byRegion = state.region === "全部" || item.region === state.region;
      return byQuery && byCategory && byRegion;
    }

    function groupedMarkup(items) {
      const groups = new Map();
      items.forEach((item) => {
        const key = `${item.category} · ${item.region}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });

      return Array.from(groups.entries()).map(([title, groupItems]) => {
        const isCollapsed = collapsedGroups.has(title);
        return `
        <section class="category ${isCollapsed ? "is-collapsed" : ""}">
          <div class="category-head">
            <h3>${escapeHtml(title)}</h3>
            <div class="category-summary">
              <button class="collapse-toggle" type="button" data-collapse-group="${escapeAttr(title)}" aria-expanded="${String(!isCollapsed)}">${isCollapsed ? "展开 +" : "收起 -"}</button>
            </div>
          </div>
          <div class="grid">
            ${groupItems.map(cardMarkup).join("")}
          </div>
        </section>
      `;
      }).join("");
    }

    function cardMarkup(item, index = 0) {
      const tags = [item.region, ...(item.notes || [])];
      const brandLogo = getBrandLogo(item);
      const logoCandidates = [...(brandLogo?.srcs || []), ...getLogoCandidates(item.url)];
      const wordmark = null;
      const palette = getCardPalette(item);
      const cardStyle = [
        `--card-delay: ${Math.min(index, 15) * 24}ms`,
        `--card-accent: ${palette.accent}`,
        `--card-accent-soft: ${palette.soft}`,
        `--card-wash: ${palette.wash}`
      ].join("; ");
      const logoBoxClass = [
        wordmark ? "logo-box has-wordmark" : "logo-box",
        brandLogo ? "has-logo" : "",
        brandLogo?.invert ? "invert-logo" : ""
      ].filter(Boolean).join(" ");
      const logoSrc = brandLogo?.src || "";
      const logoStyle = [
        brandLogo?.width ? `--logo-width: ${brandLogo.width}` : "",
        brandLogo?.maxWidth ? `--logo-max-width: ${brandLogo.maxWidth}` : "",
        brandLogo?.maxHeight ? `--logo-max-height: ${brandLogo.maxHeight}` : "",
        wordmark?.color ? `--wordmark-color: ${wordmark.color}` : "",
        wordmark?.size ? `--wordmark-size: ${wordmark.size}` : "",
        wordmark?.weight ? `--wordmark-weight: ${wordmark.weight}` : "",
        wordmark?.spacing ? `--wordmark-spacing: ${wordmark.spacing}` : ""
      ].filter(Boolean).join("; ");
      return `
        <a class="card" href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer" style="${escapeAttr(cardStyle)}">
          <div class="card-top">
            <div class="${logoBoxClass}" style="${escapeAttr(logoStyle)}">
              ${wordmark ? `<span class="brand-wordmark" aria-hidden="true">${escapeHtml(wordmark.text)}</span>` : ""}
              <img class="company-logo" alt="${escapeAttr(item.name)} logo" loading="eager" decoding="async" ${logoSrc ? `src="${escapeAttr(logoSrc)}"` : ""} data-logo-candidates="${escapeAttr(JSON.stringify(logoCandidates))}">
              <h4 class="company-name">${escapeHtml(item.name)}</h4>
            </div>
            <span class="open-mark" aria-hidden="true"></span>
          </div>
          <div class="tags">
            ${tags.map((tag, index) => `<span class="tag ${index === 0 ? "region" : ""}">${escapeHtml(tag)}</span>`).join("")}
          </div>
          <div class="url">${escapeHtml(cleanUrl(item.url))}</div>
        </a>
      `;
    }

    function getBrandLogo(item) {
      const configured =
        BRAND_LOGOS.get(normalizeBrandKey(item.name)) ||
        BRAND_LOGOS_BY_HOST.get(getHostKey(item.url));
      if (!configured) return null;
      const srcs = [configured.src, ...(configured.fallbacks || [])].filter(Boolean);
      return { ...configured, srcs };
    }

    function getWordmark(item) {
      const configured = BRAND_WORDMARKS.get(normalizeBrandKey(item.name));
      if (configured) return configured;
      if (!item.logoText) return null;
      return {
        text: item.logoText,
        color: item.logoColor,
        size: item.logoSize,
        weight: item.logoWeight,
        spacing: item.logoSpacing
      };
    }

    function getCardPalette(item) {
      const key = `${item.name}|${item.url}`;
      let hash = 0;
      for (let index = 0; index < key.length; index += 1) {
        hash = (hash * 31 + key.charCodeAt(index)) >>> 0;
      }
      return CARD_PALETTES[hash % CARD_PALETTES.length];
    }

    function hydrateLogos() {
      directory.querySelectorAll(".company-logo").forEach((image) => {
        const candidates = safeJson(image.dataset.logoCandidates, []);
        let index = image.getAttribute("src") ? 1 : 0;

        const tryNext = () => {
          if (index >= candidates.length) {
            image.closest(".logo-box")?.classList.remove("has-logo");
            return;
          }
          image.src = candidates[index];
          index += 1;
        };

        image.addEventListener("load", () => {
          image.closest(".logo-box")?.classList.add("has-logo");
        });

        image.addEventListener("error", tryNext);
        if (!image.getAttribute("src")) tryNext();
      });
    }

    function getLogoCandidates(url) {
      const parsed = new URL(url);
      const origin = parsed.origin;
      return unique([
        `${origin}/favicon.ico`,
        `${origin}/apple-touch-icon.png`,
        `${origin}/apple-touch-icon-precomposed.png`,
        `${origin}/android-chrome-192x192.png`,
        `${origin}/assets/favicon.ico`,
        `${origin}/static/favicon.ico`
      ]);
    }

    function getHostKey(url) {
      try {
        return new URL(url).hostname.toLowerCase();
      } catch (error) {
        return "";
      }
    }

    function safeJson(value, fallback) {
      try {
        return JSON.parse(value);
      } catch (error) {
        return fallback;
      }
    }

    function syncRegionButtons() {
      if (!regionButtons) return;
      regionButtons.querySelectorAll("[data-region]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.region === state.region));
      });
    }

    function syncNav() {
      navPills.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.navFilter === state.category);
      });
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean)));
    }

    function uniqueCategories(values) {
      return Array.from(new Set(values.filter(Boolean))).sort(compareCategory);
    }

    function uniqueRegions(values) {
      const hiddenRegionFilters = new Set(["CMF", "综合"]);
      return Array.from(new Set(values.filter((value) => regionOrder.has(value) && !hiddenRegionFilters.has(value)))).sort(compareRegion);
    }

    function compareCategory(a, b) {
      const rankA = categoryOrder.get(a) ?? Number.MAX_SAFE_INTEGER;
      const rankB = categoryOrder.get(b) ?? Number.MAX_SAFE_INTEGER;
      return rankA - rankB || collator.compare(a, b);
    }

    function compareRegion(a, b) {
      const rankA = regionOrder.get(a) ?? Number.MAX_SAFE_INTEGER;
      const rankB = regionOrder.get(b) ?? Number.MAX_SAFE_INTEGER;
      return rankA - rankB || collator.compare(a, b);
    }

    function getCompanyOrder(item) {
      return companyOrder.get(`${item.name}|${item.url}`) ?? Number.MAX_SAFE_INTEGER;
    }

    function normalizeBrandKey(value) {
      return String(value).trim().toLowerCase();
    }

    function cleanUrl(url) {
      return url.replace(/^https?:\/\//, "").replace(/\/$/, "");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
